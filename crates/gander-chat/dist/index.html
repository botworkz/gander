  <script>
    // -----------------------------------------------------------------------
    // gander.iframe.height — parent side of the iframe-sizing protocol
    //
    // Each MCP App iframe srcdoc embeds a small helper script (see
    // crates/gander-chat/src/goose_ext/components/mcp_app_iframe.rs) that
    // posts `{ type: "gander.iframe.height", id, height }` whenever its
    // document grows or shrinks.  We look up the iframe by `name=id` and
    // resize it directly via `style.height`.
    //
    // Why direct style:
    //   - sandboxed iframes can't see their content height from CSS
    //   - we already trust the panel author (extension layer); the cap
    //     in `.tool-call-iframe { max-height }` keeps a runaway panel from
    //     eating the viewport
    //
    // Defensive: silently ignores malformed messages, unknown ids, and
    // non-finite numbers so an extension can't crash the chat shell.
    // -----------------------------------------------------------------------
    (function () {
      "use strict";
      var MIN_PX = 200;
      window.addEventListener("message", function (event) {
        var data = event && event.data;
        if (!data || data.type !== "gander.iframe.height") return;
        var id = typeof data.id === "string" ? data.id : "";
        var h = Number(data.height);
        if (!id || !isFinite(h) || h <= 0) return;
        // Floor at MIN_PX so a transient zero-height during a re-layout
        // doesn't make the panel collapse and re-expand visibly.
        if (h < MIN_PX) h = MIN_PX;
        // CSS selector escapes are awkward for arbitrary tool-call ids;
        // iterate iframes (there will only ever be a handful).
        var frames = document.querySelectorAll("iframe.tool-call-iframe");
        for (var i = 0; i < frames.length; i++) {
          if (frames[i].name === id) {
            frames[i].style.height = h + "px";
            break;
          }
        }
      });
    })();
  </script>

  <script>
    // -----------------------------------------------------------------------
    // Development mock for window.gander
    //
    // This script is present in the *source* index.html and is therefore
    // included by `trunk serve` for local development.  It simulates the
    // host bridge so the chat UI can be exercised in a browser without a
    // live gander instance.
    //
    // The production gander binary injects its own implementation of
    // window.gander before the WASM module is instantiated, so this block
    // is only ever active during development.
    //
    // See README.md for the full bridge API contract.
    // -----------------------------------------------------------------------
    (function () {
      "use strict";

      // Only install the mock if the host hasn't already provided a real
      // window.gander. In the gander binary, BRIDGE_SCRIPT runs via wry's
      // initialization-script hook *before* page <script> tags, so
      // window.gander is already populated by the time this runs and we
      // bail out. In `trunk serve` / a plain browser, no host bridge
      // exists and this mock takes over for dev convenience.
      if (window.gander) {
        return;
      }

      var _subscriber = null;
      var _activeSessionId = "mock-session-1";

      var MOCK_SESSIONS = [
        { id: "mock-session-1", label: "Session 1", last_active: new Date(Date.now() - 5 * 60 * 1000).toISOString() },
        { id: "mock-session-2", label: "Session 2", last_active: new Date(Date.now() - 2 * 3600 * 1000).toISOString() },
        { id: "mock-session-3", label: "Session 3", last_active: new Date(Date.now() - 48 * 3600 * 1000).toISOString() },
      ];

      function fireEvent(event) {
        if (_subscriber) {
          _subscriber(event);
        }
      }

      function mockStream(userText) {
        var reply =
          "You said: **" + userText + "**\n\n" +
          "This is a _mock_ streaming response.\n\n" +
          "```rust\n" +
          "fn hello() -> &'static str {\n" +
          "    \"world\"\n" +
          "}\n" +
          "```";

        // Fire two tool calls before the text reply arrives, each going
        // through pending → in_progress → completed so the card lifecycle
        // can be exercised in dev without a live goose process.
        var toolSequence = [
          // Tool A: pending
          { delay: 100, call: { toolCallId: "tc-mock-1", title: "list_dir",   status: "pending" } },
          // Tool B: pending
          { delay: 200, call: { toolCallId: "tc-mock-2", title: "show_panel", status: "pending" } },
          // Tool A: in_progress
          { delay: 400, call: { toolCallId: "tc-mock-1", title: "list_dir",   status: "in_progress" } },
          // Tool B: in_progress
          { delay: 500, call: { toolCallId: "tc-mock-2", title: "show_panel", status: "in_progress" } },
          // Tool A: completed with I/O
          { delay: 700, call: {
              toolCallId: "tc-mock-1", title: "list_dir", status: "completed",
              rawInput:  { path: "." },
              rawOutput: { entries: ["src", "Cargo.toml", "README.md"] }
          }},
          // Tool B: completed with I/O
          { delay: 800, call: {
              toolCallId: "tc-mock-2", title: "show_panel", status: "completed",
              rawInput:  {},
              rawOutput: { resourceUri: "ui://demo/panel" }
          }},
          // Tool B: panel HTML arrives shortly after (simulates the
          // _goose/unstable/resources/read RPC).  Lets dev runs of
          // `trunk serve` exercise the iframe sizing protocol without
          // needing a live goose.
          { delay: 950, resource: {
              tool_call_id: "tc-mock-2",
              html: "<!doctype html><html><head><style>" +
                    "body{margin:0;font:14px system-ui;background:#0e0e1f;color:#e0e0e0;padding:12px}" +
                    "h3{margin:0 0 8px 0;color:#5d8bff}" +
                    "ul{margin:0;padding-left:20px}" +
                    "</style></head><body>" +
                    "<h3>Mock panel</h3>" +
                    "<p>Compact content — the parent should size the iframe " +
                    "to fit this with no scroll bar.</p>" +
                    "<ul><li>tmp/</li><li>toolshed/</li><li>fixtures/</li></ul>" +
                    "</body></html>"
          }},
          // Tool C: pending
          { delay: 250, call: { toolCallId: "tc-mock-3", title: "broken_thing", status: "pending" } },
          // Tool C: in_progress
          { delay: 520, call: { toolCallId: "tc-mock-3", title: "broken_thing", status: "in_progress" } },
          // Tool C: failed
          { delay: 850, call: {
              toolCallId: "tc-mock-3", title: "broken_thing", status: "failed",
              rawInput: {}, rawOutput: { error: "demo" }
          }},
        ];

        toolSequence.forEach(function(item) {
          setTimeout(function() {
            if (item.resource) {
              // Mock the goose-ext tool_resource event (which the host
              // normally emits after fetching `_goose/unstable/resources/read`).
              fireEvent({
                type: "tool_resource",
                tool_call_id: item.resource.tool_call_id,
                html: item.resource.html,
              });
            } else {
              fireEvent({ type: "tool_call", call: JSON.stringify(item.call) });
            }
          }, item.delay);
        });

        // Stream the text reply after the tool calls have settled.
        var tokens = reply.split(/(?<=\s)|(?=\s)/);
        var i = 0;
        setTimeout(function() {
          var interval = setInterval(function () {
            if (i < tokens.length) {
              fireEvent({ type: "agent_text", content: tokens[i] });
              i++;
            } else {
              fireEvent({ type: "done" });
              clearInterval(interval);
            }
          }, 50);
        }, 1000);
      }

      function mockSessionLoad(id) {
        var entry = MOCK_SESSIONS.find(function(s) { return s.id === id; });
        var title = entry ? entry.label : id;
        fireEvent({ type: "session_load_start" });
        var history = [
          { role: "user", text: "Tell me about " + title },
          { role: "agent", text: "Sure! Here is what I know about **" + title + "**." },
          { role: "tool_use", name: "read_file", input: '{"path": "/project/README.md"}' },
          { role: "tool_result", name: "read_file", output: "# Project\nThis is the README." },
          { role: "agent", text: "Done reading. Anything else?" },
        ];
        var delay = 80;
        history.forEach(function(item) {
          setTimeout(function() {
            if (item.role === "user") {
              fireEvent({ type: "user_text", content: item.text });
            } else if (item.role === "agent") {
              fireEvent({ type: "agent_text", content: item.text });
              setTimeout(function() { fireEvent({ type: "done" }); }, 30);
            } else if (item.role === "tool_use") {
              fireEvent({ type: "tool_use", name: item.name, input: item.input });
            } else if (item.role === "tool_result") {
              fireEvent({ type: "tool_result", name: item.name, output: item.output });
            }
          }, delay);
          delay += 80;
        });
        setTimeout(function() {
          fireEvent({ type: "session_load_end" });
        }, delay + 40);
      }

      function handlePost(message) {
        var type = message && message.type;
        if (type === "ready") {
          // Respond to the WASM startup handshake with mock session data.
          setTimeout(function () {
            fireEvent({ type: "session_list", sessions: MOCK_SESSIONS });
            fireEvent({ type: "session_active", id: _activeSessionId, history: [] });
            // Footer metadata: cwd and model are real fields; tool_count is a
            // placeholder until ACP v1 exposes it.
            fireEvent({
              type: "session_info",
              cwd: "/home/phlax/dev/local/gander",
              model: "claude-opus-4.7",
              tool_count: 9,
            });
          }, 50);
        } else if (type === "session_select") {
          var id = message.id;
          console.log("[mock gander] session_select:", id);
          _activeSessionId = id;
          setTimeout(function() { mockSessionLoad(id); }, 150);
        } else if (type === "session_new") {
          console.log("[mock gander] session_new");
          var newId = "mock-session-" + (MOCK_SESSIONS.length + 1);
          var newEntry = {
            id: newId,
            label: "Session " + (MOCK_SESSIONS.length + 1),
            last_active: new Date().toISOString(),
          };
          MOCK_SESSIONS.unshift(newEntry);
          _activeSessionId = newId;
          fireEvent({ type: "session_list", sessions: MOCK_SESSIONS.slice(0, 5) });
          fireEvent({ type: "session_active", id: newId, history: [] });
        } else {
          console.log("[mock gander] post:", message);
        }
      }

      window.gander = {
        /**
         * Queue a user message and start streaming the assistant reply.
         * @param {string} text  The user's message text.
         */
        send: function (text) {
          console.log("[mock gander] send:", text);
          // Simulate a short network round-trip before the first token.
          setTimeout(function () { mockStream(text); }, 300);
        },

        /**
         * Post an arbitrary JSON message object to the host.
         * Used for session control: ready, session_select, session_new.
         * @param {object} message
         */
        post: function (message) {
          console.log("[mock gander] post:", message);
          handlePost(message);
        },

        /**
         * Register a callback that receives streaming events.
         * Replaces any previously registered callback.
         * @param {function(object): void} callback
         */
        subscribe: function (callback) {
          console.log("[mock gander] subscribe registered");
          _subscriber = callback;
        },
      };
    })();
  </script>
