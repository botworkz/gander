<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gander chat</title>

  <!--
    Trunk replaces this tag with the compiled WASM + JS loader.
    data-wasm-opt="z" enables wasm-opt level z (smallest size) on release builds.
  -->
  <link data-trunk rel="rust" data-wasm-opt="z">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── top-level shell: sidebar + chat pane side-by-side ─── */

    .gander-root {
      display: flex;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── session sidebar ─────────────────────────────────────── */

    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #131326;
      border-right: 1px solid #2a2a3e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .new-session-btn {
      background: #2d5be3;
      color: #fff;
      border: none;
      border-radius: 0;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .new-session-btn:hover {
      background: #3d6bf3;
    }

    .session-list {
      height: 50%;
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .session-item {
      background: none;
      border: none;
      color: #b0b0c8;
      padding: 10px 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
      border-bottom: 1px solid #1e1e32;
      font-family: inherit;
      font-size: 0.85rem;
    }

    .session-item:hover {
      background: #1e1e38;
      color: #e0e0e0;
    }

    .session-item--active {
      background: #1e2e54;
      color: #e0e0ff;
      border-left: 3px solid #2d5be3;
    }

    .session-item--active:hover {
      background: #1e3060;
    }

    .session-label {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-ago {
      font-size: 0.78rem;
      opacity: 0.65;
    }

    /* ── concertina menu ─────────────────────────────────────── */

    .concertina {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border-top: 1px solid #2a2a3e;
    }

    .concertina-section {
      display: flex;
      flex-direction: column;
    }

    .concertina-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid #1e1e32;
      color: #b0b0c8;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
    }

    .concertina-row:hover {
      background: #1e1e38;
      color: #e0e0e0;
    }

    .concertina-row--open {
      background: #1a1a2e;
      color: #c0c0e0;
    }

    .concertina-icon {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .concertina-label {
      flex: 1;
    }

    .concertina-chevron {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    .concertina-chevron--open {
      transform: rotate(90deg);
    }

    .concertina-content {
      padding: 16px 14px;
      background: #0e0e1f;
      border-bottom: 1px solid #1e1e32;
    }

    .concertina-placeholder {
      display: block;
      text-align: center;
      color: #5a5a7a;
      font-size: 0.82rem;
      font-style: italic;
    }

    /* ── chat pane ───────────────────────────────────────────── */

    .gander-chat {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── message list ────────────────────────────────────────── */

    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.55;
      word-break: break-word;
    }

    .message--user {
      background: #2d5be3;
      align-self: flex-end;
    }

    .message--assistant {
      background: #2a2a3e;
      align-self: flex-start;
    }

    /* tool call / result: gray, narrower, monospace feel */
    .message--tool {
      background: #1e2030;
      align-self: flex-start;
      border: 1px solid #2e3050;
      font-size: 0.88em;
      max-width: 90%;
    }

    /* pulldown-cmark wraps everything in <p>; strip the outer margin */
    .message-content p:first-child { margin-top: 0; }
    .message-content p:last-child  { margin-bottom: 0; }

    .message-content code {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: ui-monospace, monospace;
      font-size: 0.9em;
    }

    .message-content pre {
      background: rgba(0, 0, 0, 0.35);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .message-content pre code {
      background: none;
      padding: 0;
    }

    /* blinking cursor shown while the assistant is still streaming */
    .streaming-cursor {
      display: inline-block;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
      opacity: 0.8;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .error-notice {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* ── input row ───────────────────────────────────────────── */

    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #333;
    }

    .input-box {
      flex: 1;
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 9px 13px;
      font-family: inherit;
      font-size: inherit;
      resize: none;
      line-height: 1.5;
    }

    .input-box:focus {
      outline: none;
      border-color: #2d5be3;
    }

    .input-box:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .send-btn {
      background: #2d5be3;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      align-self: flex-end;
      white-space: nowrap;
    }

    .send-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .send-btn:hover:not(:disabled) {
      background: #3d6bf3;
    }
    /* ── input footer ────────────────────────────────────────── */

    .input-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      border-top: 1px solid #282838;
      font-size: 0.78rem;
      color: #8888a8;
      background: #16162a;
      overflow: hidden;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* cwd: takes available space but clips with ellipsis rather than wrapping */
    .footer-cwd {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      flex: 0 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* thin divider between groups */
    .footer-sep {
      opacity: 0.35;
      flex-shrink: 0;
    }

    /* placeholder fields — they stay on one line and don't grow */
    .footer-tokens,
    .footer-model,
    .footer-mode,
    .footer-tools {
      flex-shrink: 0;
    }

    /* icon-only buttons (attach, settings) */
    .footer-btn {
      display: flex;
      align-items: center;
      background: none;
      border: none;
      padding: 0 2px;
      cursor: pointer;
      color: inherit;
      font-size: inherit;
      flex-shrink: 0;
    }

    .footer-btn:hover {
      color: #b0b0d0;
    }

    /* ── tool call card ──────────────────────────────────────────── */

    /* Override the generic .message padding so the card controls its own */
    .tool-call-card {
      padding: 0;
      border-radius: 8px;
      background: #16162a;
      border: 1px solid #282838;
    }

    /* Full-width clickable header — no browser button chrome */
    .tool-call-header {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: none;
      box-shadow: none;
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      text-align: left;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .tool-call-header:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    /* Title takes all remaining space, clips with ellipsis */
    .tool-call-title {
      flex: 1;
      font-weight: 500;
      color: #b0b0d0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Status badge: small, muted; ✓ and ✗ get their own tint */
    .tool-call-status {
      flex-shrink: 0;
      font-size: 0.78rem;
      color: #8888a8;
    }

    /* ✓ completed */
    .tool-call-status:not(:empty) {
      color: #8888a8;
    }

    /* Chevron rotates when the body is open */
    .tool-call-chevron {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      color: #8888a8;
      transition: transform 0.15s ease;
    }

    .tool-call-chevron--open {
      transform: rotate(90deg);
    }

    /* Expanded body, separated from header by a thin border */
    .tool-call-body {
      border-top: 1px solid #282838;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tool-call-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* "Input" / "Output" label above each pre block */
    .tool-call-section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #8888a8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Monospace pre block with subtle background tint */
    .tool-call-pre {
      margin: 0;
      padding: 8px 10px;
      background: #0e0e1f;
      border-radius: 6px;
      font-family: ui-monospace, monospace;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: #c0c0d8;
      overflow-x: auto;
    }
  </style>

  <script>
    // -----------------------------------------------------------------------
    // Development mock for window.gander
    //
    // This script is present in the *source* index.html and is therefore
    // included by `trunk serve` for local development.  It simulates the
    // host bridge so the chat UI can be exercised in a browser without a
    // live gander instance.
    //
    // The production gander binary injects its own implementation of
    // window.gander before the WASM module is instantiated, so this block
    // is only ever active during development.
    //
    // See README.md for the full bridge API contract.
    // -----------------------------------------------------------------------
    (function () {
      "use strict";

      // Only install the mock if the host hasn't already provided a real
      // window.gander. In the gander binary, BRIDGE_SCRIPT runs via wry's
      // initialization-script hook *before* page <script> tags, so
      // window.gander is already populated by the time this runs and we
      // bail out. In `trunk serve` / a plain browser, no host bridge
      // exists and this mock takes over for dev convenience.
      if (window.gander) {
        return;
      }

      var _subscriber = null;
      var _activeSessionId = "mock-session-1";

      var MOCK_SESSIONS = [
        { id: "mock-session-1", label: "Session 1", last_active: new Date(Date.now() - 5 * 60 * 1000).toISOString() },
        { id: "mock-session-2", label: "Session 2", last_active: new Date(Date.now() - 2 * 3600 * 1000).toISOString() },
        { id: "mock-session-3", label: "Session 3", last_active: new Date(Date.now() - 48 * 3600 * 1000).toISOString() },
      ];

      function fireEvent(event) {
        if (_subscriber) {
          _subscriber(event);
        }
      }

      function mockStream(userText) {
        var reply =
          "You said: **" + userText + "**\n\n" +
          "This is a _mock_ streaming response.\n\n" +
          "```rust\n" +
          "fn hello() -> &'static str {\n" +
          "    \"world\"\n" +
          "}\n" +
          "```";

        // Fire two tool calls before the text reply arrives, each going
        // through pending → in_progress → completed so the card lifecycle
        // can be exercised in dev without a live goose process.
        var toolSequence = [
          // Tool A: pending
          { delay: 100, call: { toolCallId: "tc-mock-1", title: "list_dir",   status: "pending" } },
          // Tool B: pending
          { delay: 200, call: { toolCallId: "tc-mock-2", title: "show_panel", status: "pending" } },
          // Tool A: in_progress
          { delay: 400, call: { toolCallId: "tc-mock-1", title: "list_dir",   status: "in_progress" } },
          // Tool B: in_progress
          { delay: 500, call: { toolCallId: "tc-mock-2", title: "show_panel", status: "in_progress" } },
          // Tool A: completed with I/O
          { delay: 700, call: {
              toolCallId: "tc-mock-1", title: "list_dir", status: "completed",
              rawInput:  { path: "." },
              rawOutput: { entries: ["src", "Cargo.toml", "README.md"] }
          }},
          // Tool B: completed with I/O
          { delay: 800, call: {
              toolCallId: "tc-mock-2", title: "show_panel", status: "completed",
              rawInput:  {},
              rawOutput: { resourceUri: "ui://demo/panel" }
          }},
        ];

        toolSequence.forEach(function(item) {
          setTimeout(function() {
            fireEvent({ type: "tool_call", call: JSON.stringify(item.call) });
          }, item.delay);
        });

        // Stream the text reply after the tool calls have settled.
        var tokens = reply.split(/(?<=\s)|(?=\s)/);
        var i = 0;
        setTimeout(function() {
          var interval = setInterval(function () {
            if (i < tokens.length) {
              fireEvent({ type: "agent_text", content: tokens[i] });
              i++;
            } else {
              fireEvent({ type: "done" });
              clearInterval(interval);
            }
          }, 50);
        }, 1000);
      }

      function mockSessionLoad(id) {
        var entry = MOCK_SESSIONS.find(function(s) { return s.id === id; });
        var title = entry ? entry.label : id;
        fireEvent({ type: "session_load_start" });
        var history = [
          { role: "user", text: "Tell me about " + title },
          { role: "agent", text: "Sure! Here is what I know about **" + title + "**." },
          { role: "tool_use", name: "read_file", input: '{"path": "/project/README.md"}' },
          { role: "tool_result", name: "read_file", output: "# Project\nThis is the README." },
          { role: "agent", text: "Done reading. Anything else?" },
        ];
        var delay = 80;
        history.forEach(function(item) {
          setTimeout(function() {
            if (item.role === "user") {
              fireEvent({ type: "user_text", content: item.text });
            } else if (item.role === "agent") {
              fireEvent({ type: "agent_text", content: item.text });
              setTimeout(function() { fireEvent({ type: "done" }); }, 30);
            } else if (item.role === "tool_use") {
              fireEvent({ type: "tool_use", name: item.name, input: item.input });
            } else if (item.role === "tool_result") {
              fireEvent({ type: "tool_result", name: item.name, output: item.output });
            }
          }, delay);
          delay += 80;
        });
        setTimeout(function() {
          fireEvent({ type: "session_load_end" });
        }, delay + 40);
      }

      function handlePost(message) {
        var type = message && message.type;
        if (type === "ready") {
          // Respond to the WASM startup handshake with mock session data.
          setTimeout(function () {
            fireEvent({ type: "session_list", sessions: MOCK_SESSIONS });
            fireEvent({ type: "session_active", id: _activeSessionId, history: [] });
            // Footer metadata: cwd and model are real fields; tool_count is a
            // placeholder until ACP v1 exposes it.
            fireEvent({
              type: "session_info",
              cwd: "/home/phlax/dev/local/gander",
              model: "claude-opus-4.7",
              tool_count: 9,
            });
          }, 50);
        } else if (type === "session_select") {
          var id = message.id;
          console.log("[mock gander] session_select:", id);
          _activeSessionId = id;
          setTimeout(function() { mockSessionLoad(id); }, 150);
        } else if (type === "session_new") {
          console.log("[mock gander] session_new");
          var newId = "mock-session-" + (MOCK_SESSIONS.length + 1);
          var newEntry = {
            id: newId,
            label: "Session " + (MOCK_SESSIONS.length + 1),
            last_active: new Date().toISOString(),
          };
          MOCK_SESSIONS.unshift(newEntry);
          _activeSessionId = newId;
          fireEvent({ type: "session_list", sessions: MOCK_SESSIONS.slice(0, 5) });
          fireEvent({ type: "session_active", id: newId, history: [] });
        } else {
          console.log("[mock gander] post:", message);
        }
      }

      window.gander = {
        /**
         * Queue a user message and start streaming the assistant reply.
         * @param {string} text  The user's message text.
         */
        send: function (text) {
          console.log("[mock gander] send:", text);
          // Simulate a short network round-trip before the first token.
          setTimeout(function () { mockStream(text); }, 300);
        },

        /**
         * Post an arbitrary JSON message object to the host.
         * Used for session control: ready, session_select, session_new.
         * @param {object} message
         */
        post: function (message) {
          console.log("[mock gander] post:", message);
          handlePost(message);
        },

        /**
         * Register a callback that receives streaming events.
         * Replaces any previously registered callback.
         * @param {function(object): void} callback
         */
        subscribe: function (callback) {
          console.log("[mock gander] subscribe registered");
          _subscriber = callback;
        },
      };
    })();
  </script>
</head>
<body>
  <!--
    Trunk injects the WASM loader at the end of <body>.
    The mock window.gander above is already set by the time the WASM
    module initialises and calls bridge::subscribe().
  -->
</body>
</html>
